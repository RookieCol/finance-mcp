name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type-check (mypy)
        run: uv run mypy src/finance_mcp

      - name: Security — SAST (bandit)
        run: uv run bandit -c pyproject.toml -r src/finance_mcp

      - name: Security — dependency audit (pip-audit)
        run: uv run pip-audit

      - name: Tests
        run: uv run pytest --cov=finance_mcp --cov-report=term-missing
