services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: finance
      POSTGRES_PASSWORD: finance
      POSTGRES_DB: finance
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+psycopg://finance:finance@postgres:5432/finance
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://finance:finance@postgres:5432/finance
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5

  scheduler:
    build: .
    command: ["finance-scheduler"]
    environment:
      DATABASE_URL: postgresql+psycopg://finance:finance@postgres:5432/finance
      LOG_LEVEL: INFO
      NOTIFIER_WEBHOOK_URL: ${NOTIFIER_WEBHOOK_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  backup:
    image: postgres:17-alpine
    environment:
      PGPASSWORD: finance
      RETENTION_DAYS: "14"
    volumes:
      - ./docker/backups:/backups
      - ./docker/backup.sh:/backup.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["sh", "/backup.sh"]

volumes:
  pg_data:
