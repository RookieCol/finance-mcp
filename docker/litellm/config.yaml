# LiteLLM proxy config — routes the configured model through OpenRouter
# (swap for any LiteLLM-supported provider), reports every call to
# Langfuse, and enforces a hard monthly budget cap so a runaway agent
# loop stops at the proxy instead of on the credit-card statement.
#
# Env vars referenced here (OPENROUTER_API_KEY, LANGFUSE_*,
# LITELLM_BUDGET_USD_MONTHLY) come from docker-compose.langfuse.yml /
# your .env — see .env.example.

model_list:
  - model_name: default
    litellm_params:
      model: openrouter/anthropic/claude-3.5-sonnet
      api_key: os.environ/OPENROUTER_API_KEY
      max_budget: os.environ/LITELLM_BUDGET_USD_MONTHLY
      budget_duration: 30d

litellm_settings:
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
  drop_params: true

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  # Hard proxy-wide ceiling in addition to the per-model budget above —
  # belt and suspenders: a new model added to model_list without its own
  # max_budget still can't exceed this.
  max_budget: os.environ/LITELLM_BUDGET_USD_MONTHLY
  budget_duration: 30d
