# Minimal Hermes config for the hermes-dev compose profile.
#
# Registers caudal as a local MCP server. Model backend: OpenRouter,
# direct — Hermes' own named-provider config (`providers:` below, schema
# confirmed against Hermes' own cli-config.yaml.example: base_url +
# key_env) is all the "pick a model/provider" flexibility needed here, no
# proxy required. Budget cap and LLM cost/tracing are OpenRouter dashboard
# settings (per-key spending cap; "Broadcast to Langfuse" + Usage
# Accounting for a free Langfuse Cloud project) — see docs/observability.md.
#
# This file documents the config Hermes needs; on first run Hermes
# persists its own copy under the mounted /opt/data, so merge this in
# (or run `hermes setup` inside the container and answer accordingly)
# rather than assuming this file alone is sufficient — exact merge
# behavior depends on the Hermes version. See README "Connecting to
# Hermes" for the equivalent `hermes mcp add` CLI form.

providers:
  openrouter-finance:
    base_url: "https://openrouter.ai/api/v1"
    key_env: "OPENROUTER_API_KEY"

model:
  default: "google/gemini-3.1-flash-lite-preview"   # cheap, fast, 1,048,576 token context
  provider: "openrouter-finance"
  context_length: 1048576

# gemini-3.1-flash-lite-preview isn't a thinking-capable variant, but
# Hermes defaults to agent.reasoning_effort: medium and sends a "thinking"
# request param regardless of provider/model — some backends (Ollama's
# /v1 endpoint, confirmed) reject that outright for non-reasoning models.
# Kept disabled here as cheap insurance even though OpenRouter itself
# tolerates the param more gracefully.
# scripts/patch_hermes_config.py merges this into the existing `agent:`
# block rather than replacing it, so Hermes-managed keys (personalities,
# max_turns, ...) are preserved.
agent:
  reasoning_effort: "none"

mcp_servers:
  caudal:
    command: "uv"
    args:
      - "--directory"
      - "/workspace/caudal"
      - "run"
      - "--no-dev"        # skip ruff/mypy/hypothesis/etc — MCP runtime doesn't need them
      - "caudal-mcp"
    env:
      DATABASE_URL: "${FINANCE_DATABASE_URL}"
      # /workspace/caudal is bind-mounted read-only (see
      # docker-compose.hermes-dev.yml) and its .venv/ is the *host's* own
      # (macOS) virtualenv, whose interpreter symlink is invalid inside
      # this Linux container. Without these, `uv run` tries to repair that
      # venv in place and fails ("Read-only file system") before caudal
      # ever starts — Hermes then reports the MCP server as failed to
      # connect, with no tools available, regardless of model/config.
      # Both paths must match the volume mounts in docker-compose.hermes-
      # dev.yml's `hermes` and `hermes-mcp-warm` services exactly — venv
      # *and* the Python interpreter uv installed for it both need to
      # persist across ephemeral `docker compose run` containers, or uv
      # finds a venv whose python symlink points nowhere and rebuilds
      # everything from scratch anyway (slower than Hermes' MCP connect
      # timeout, every single time).
      UV_PROJECT_ENVIRONMENT: "/opt/caudal-venv/venv"
      UV_PYTHON_INSTALL_DIR: "/opt/caudal-venv/python"
    tools:
      include:
        - record_transaction
        - update_transaction
        - list_transactions
        - get_totals
        - list_categories
        - get_projections
        - get_digest
        - check_alerts
