# Optional profile: a local Hermes Agent instance for testing the live
# chat -> MCP integration without needing Telegram/Slack.
#
# LLM backend: OpenRouter, direct — no local model, no proxy in front.
# Set OPENROUTER_API_KEY in .env, then:
#
#   docker compose -f docker-compose.yml -f docker-compose.hermes-dev.yml \
#     --profile hermes-dev run --rm hermes-mcp-warm   # first time only
#   docker compose -f docker-compose.yml -f docker-compose.hermes-dev.yml \
#     --profile hermes-dev run --rm hermes hermes
#
# (docker/hermes/config.yaml is what actually configures the model — see
# its comments.) Budget control and LLM tracing are OpenRouter dashboard
# settings, not anything this compose file configures: set a per-key
# spending cap under API Keys, and enable "Broadcast to Langfuse" (with
# Usage Accounting) to send traces/cost to a free Langfuse Cloud project
# — see docs/observability.md. No LiteLLM proxy or self-hosted Langfuse
# stack needed: OpenRouter already does both natively, upstream, more
# robustly than a locally-maintained proxy would (a spending cap enforced
# at OpenRouter rejects requests before they reach the provider at all).
#
# Uses the official prebuilt image (nousresearch/hermes-agent) rather than
# building Hermes from source. This repo's source is bind-mounted in so
# Hermes can launch `caudal` via `uv` against it (see
# docker/hermes/config.yaml's mcp_servers.caudal.command).
services:
  # One-shot: pre-builds the caudal server's own venv (uv sync) into
  # a named volume before Hermes ever tries to spawn it. Without this,
  # every `docker compose run --rm hermes` starts a brand-new container,
  # so `uv run caudal` would rebuild its venv from scratch (~100+
  # packages) on every single chat session — which takes longer than
  # Hermes' MCP server connection timeout, so the caudal tools silently
  # never load ("MCP server 'caudal' initial connection failed", no
  # error surfaced to the user, the model just falls back to its generic
  # `memory` tool instead). Two things must persist across ephemeral
  # containers, not just one: the venv itself (UV_PROJECT_ENVIRONMENT)
  # *and* the Python interpreter uv installs for it (UV_PYTHON_INSTALL_DIR)
  # — without the latter, uv finds the venv but its python symlink points
  # at a binary that no longer exists in the new container's filesystem,
  # and rebuilds everything anyway. Both live under the same
  # hermes_caudal_venv volume mount. No-op on re-run once already synced.
  hermes-mcp-warm:
    image: nousresearch/hermes-agent:latest
    profiles: ["hermes-dev"]
    entrypoint: ["sh", "-c"]
    command:
      - "uv --directory /workspace/caudal sync --no-dev"
    environment:
      UV_PROJECT_ENVIRONMENT: "/opt/caudal-venv/venv"
      UV_PYTHON_INSTALL_DIR: "/opt/caudal-venv/python"
    volumes:
      - .:/workspace/caudal:ro
      - hermes_caudal_venv:/opt/caudal-venv

  hermes:
    image: nousresearch/hermes-agent:latest
    profiles: ["hermes-dev"]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      hermes-mcp-warm:
        condition: service_completed_successfully
    volumes:
      - ./docker/hermes/data:/opt/data
      - .:/workspace/caudal:ro
      - hermes_caudal_venv:/opt/caudal-venv
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?set OPENROUTER_API_KEY in .env — see .env.example}
      FINANCE_DATABASE_URL: postgresql+psycopg://finance:finance@postgres:5432/finance
    stdin_open: true
    tty: true

volumes:
  hermes_caudal_venv:
