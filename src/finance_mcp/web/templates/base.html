<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Vertex{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', path='app.css') }}">
</head>
<body>
  {% set path = request.url.path %}
  <header class="appbar">
    <div class="brand">Vertex<span class="brand-sub">finance</span></div>
    <nav class="pillnav">
      <a href="/" class="{{ 'active' if path == '/' }}">Dashboard</a>
      <a href="/transactions" class="{{ 'active' if path.startswith('/transactions') }}">Transactions</a>
      <a href="/budgets" class="{{ 'active' if path == '/budgets' }}">Budgets</a>
      <a href="/alerts" class="{{ 'active' if path == '/alerts' }}">Alerts</a>
      <a href="/projections" class="{{ 'active' if path == '/projections' }}">Projections</a>
      <a href="/reports" class="{{ 'active' if path == '/reports' }}">Reports</a>
    </nav>
  </header>
  <div class="shell">
    <main>
      {% block content %}{% endblock %}
    </main>
  </div>
  <nav class="tabbar">
    <a href="/" class="{{ 'active' if path == '/' }}">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-7 9 7v9a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/></svg>
      Home
    </a>
    <a href="/transactions" class="{{ 'active' if path.startswith('/transactions') }}">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
      Activity
    </a>
    <a href="/reports" class="{{ 'active' if path == '/reports' }}">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V10M12 20V4M20 20v-7"/></svg>
      Reports
    </a>
    <a href="/budgets" class="{{ 'active' if path == '/budgets' }}">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4.5"/><circle cx="12" cy="12" r="0.5" fill="currentColor"/></svg>
      Budgets
    </a>
    <a href="/alerts" class="{{ 'active' if path == '/alerts' }}">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      Alerts
    </a>
  </nav>
</body>
</html>
