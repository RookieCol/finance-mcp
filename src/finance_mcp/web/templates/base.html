<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}finance-mcp{% endblock %}</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: -apple-system, system-ui, sans-serif; max-width: 960px; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; }
    nav { display: flex; gap: 1rem; margin-bottom: 1.5rem; border-bottom: 1px solid #8883; padding-bottom: 0.75rem; }
    nav a { text-decoration: none; color: inherit; opacity: 0.7; }
    nav a:hover, nav a.active { opacity: 1; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
    th, td { text-align: left; padding: 0.4rem 0.6rem; border-bottom: 1px solid #8882; }
    th { opacity: 0.7; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; }
    .amount-income { color: #1a7f37; }
    .amount-expense { color: #cf222e; }
    form.inline { display: inline; }
    .form-grid { display: grid; grid-template-columns: 160px 1fr; gap: 0.5rem 1rem; max-width: 480px; align-items: center; }
    input, select, button { font: inherit; padding: 0.35rem 0.5rem; }
    button { cursor: pointer; }
    .card { border: 1px solid #8883; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
    .card h3 { margin-top: 0; }
    .bar-row { display: flex; align-items: center; gap: 0.5rem; margin: 0.25rem 0; font-variant-numeric: tabular-nums; }
    .bar-label { width: 90px; font-size: 0.85rem; opacity: 0.75; }
    .bar-track { flex: 1; background: #8882; border-radius: 4px; height: 18px; position: relative; }
    .bar-fill { height: 100%; border-radius: 4px; }
    .bar-fill.positive { background: #1a7f37; }
    .bar-fill.negative { background: #cf222e; }
    .bar-value { width: 90px; text-align: right; font-size: 0.85rem; }
    .badge { display: inline-block; padding: 0.1rem 0.5rem; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
    .badge-warning { background: #fff3cd; color: #7a5c00; }
    .badge-critical { background: #ffd8d3; color: #7a1a10; }
    .badge-info { background: #ddeeff; color: #1a4a7a; }
    .muted { opacity: 0.65; font-size: 0.9rem; }
  </style>
</head>
<body>
  <nav>
    <a href="/">Dashboard</a>
    <a href="/transactions">Transactions</a>
    <a href="/budgets">Budgets</a>
    <a href="/alerts">Alerts</a>
  </nav>
  {% block content %}{% endblock %}
</body>
</html>
